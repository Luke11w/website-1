<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>JOHN PORK 📞</title>
  <style>
    body {
      margin: 0;
      font-family: Comic Sans MS;
      color: white;
      text-align: center;
      background: linear-gradient(45deg, red, purple, blue, black);
      background-size: 400% 400%;
      animation: bg 5s infinite;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      text-shadow: 0 0 20px white;
      animation: shake 0.3s infinite;
    }

    @keyframes shake {
      0% {transform: translate(0,0);}
      25% {transform: translate(5px,-5px);}
      50% {transform: translate(-5px,5px);}
      75% {transform: translate(5px,5px);}
      100% {transform: translate(-5px,-5px);}
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      width: 80%;
      max-width: 600px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      box-shadow: 0 0 30px red;
    }

    img {
      width: 300px;
      border-radius: 20px;
      box-shadow: 0 0 25px white;
      animation: spin 5s linear infinite;
    }

    @keyframes spin {
      from {transform: rotate(0deg);}
      to {transform: rotate(360deg);}
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      background: yellow;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 10px;
    }

    button:hover {
      background: orange;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: black;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>📞 JOHN PORK IS CALLING 🐷</h1>

  <div class="box">
    <p>du hast nicht abgenommen...</p>
    <img src="https://i.imgur.com/9XnK4bM.png">
    <p>jetzt ist es zu spät 😈</p>
    <button onclick="alert('📞 DU HAST DEN ANRUF VERPASST')">ANRUF ANNEHMEN</button>
  </div>

  <div class="box">
    <p>brain rot level: 999999999</p>
    <button onclick="crazy()">NICHT DRÜCKEN</button>
  </div>

  <audio id="sound">
    <source src="https://www.myinstants.com/media/sounds/troll.mp3" type="audio/mpeg">
  </audio>

  <footer>
    ⚠️ diese seite ist cursed ⚠️
  </footer>

  <script>
    function crazy() {
      document.body.style.background = "white";
      document.body.style.color = "black";
      document.body.innerHTML += "<h1>HAHAHA ES IST ZU SPÄT</h1>";
      document.getElementById("sound").play();
    }
  </script>

</body>
</html>
