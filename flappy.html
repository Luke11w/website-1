<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Pork Flappy</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #3a0070 0%, #120028 45%, #05000f 100%);
      color: white;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: floatGlow 10s ease-in-out infinite;
    }

    .bg1 {
      width: 220px;
      height: 220px;
      background: #ff00c8;
      top: 5%;
      left: 6%;
    }

    .bg2 {
      width: 280px;
      height: 280px;
      background: #00d9ff;
      right: 5%;
      top: 20%;
      animation-delay: 2s;
    }

    .bg3 {
      width: 180px;
      height: 180px;
      background: #00ff88;
      bottom: 8%;
      left: 25%;
      animation-delay: 4s;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.08); }
    }

    .wrap {
      width: min(96vw, 980px);
      position: relative;
      z-index: 2;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 34px;
      font-weight: bold;
      text-shadow: 0 0 10px #fff, 0 0 22px #ff00c8, 0 0 30px #00d9ff;
    }

    .hud {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 10px 14px;
      min-width: 120px;
      text-align: center;
      box-shadow: 0 0 18px rgba(0,0,0,0.24);
    }

    .label {
      font-size: 13px;
      opacity: 0.9;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      color: #ffe766;
    }

    .controls {
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, .home-btn {
      background: linear-gradient(90deg, #ffe600, #ffb300);
      color: #111;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover, .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(255, 230, 0, 0.55);
    }

    .game-shell {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.25);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: transparent;
      cursor: pointer;
    }

    .hint {
      margin-top: 10px;
      text-align: center;
      color: #eee;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 5;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      width: min(92%, 520px);
      background: linear-gradient(135deg, rgba(255,0,180,0.18), rgba(0,170,255,0.18), rgba(0,255,130,0.16));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      padding: 26px 22px;
      text-align: center;
      box-shadow: 0 0 32px rgba(255,255,255,0.12);
    }

    .overlay-box h2 {
      margin-top: 0;
      font-size: 34px;
      text-shadow: 0 0 10px #fff, 0 0 18px #00d9ff;
    }

    .overlay-box p {
      font-size: 18px;
      line-height: 1.5;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      opacity: 0.95;
      animation: burst 0.9s ease-out forwards;
    }

    @keyframes burst {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.2);
        opacity: 0;
      }
    }

    @media (max-width: 700px) {
      .title {
        font-size: 26px;
      }

      .value {
        font-size: 20px;
      }

      button, .home-btn {
        font-size: 15px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg1"></div>
  <div class="bg-glow bg2"></div>
  <div class="bg-glow bg3"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">🐷 John Pork Flappy</div>

      <div class="hud">
        <div class="box">
          <div class="label">Score</div>
          <div class="value" id="scoreValue">0</div>
        </div>
        <div class="box">
          <div class="label">Best Score</div>
          <div class="value" id="bestValue">0</div>
        </div>
        <div class="box">
          <div class="label">Level</div>
          <div class="value" id="levelValue">1</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">▶️ Start</button>
      <button id="restartBtn">🔄 Neustart</button>
      <a class="home-btn" href="index.html">🏠 Home</a>
    </div>

    <div class="game-shell">
      <canvas id="game" width="960" height="540"></canvas>

      <div class="particles" id="particles"></div>

      <div class="overlay" id="startOverlay">
        <div class="overlay-box">
          <h2>Flappy John Pork</h2>
          <p>
            Klick oder drück <b>Leertaste</b>, damit John Pork fliegt.<br>
            Weiche den Pipes aus und mach den krankesten Highscore.
          </p>
          <button onclick="startGame()">▶️ Jetzt spielen</button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-box">
          <h2>💀 Game Over</h2>
          <p id="gameOverText">Du bist abgestürzt.</p>
          <button onclick="startGame()">🔄 Nochmal spielen</button>
        </div>
      </div>
    </div>

    <div class="hint">
      Steuerung: Klick / Leertaste / Tippen auf dem Handy
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreValue = document.getElementById("scoreValue");
    const bestValue = document.getElementById("bestValue");
    const levelValue = document.getElementById("levelValue");
    const startOverlay = document.getElementById("startOverlay");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const gameOverText = document.getElementById("gameOverText");
    const particlesEl = document.getElementById("particles");
    const bestKey = "johnPorkFlappyBest";

    let animationId = null;
    let running = false;
    let score = 0;
    let level = 1;
    let frame = 0;
    let speed = 3.4;

    const gravity = 0.42;
    const flapPower = -7.2;

    const bird = {
      x: 180,
      y: 260,
      w: 74,
      h: 74,
      velocity: 0,
      angle: 0
    };

    let pipes = [];
    let stars = [];
    let clouds = [];

    function getBestScore() {
      return Number(localStorage.getItem(bestKey) || 0);
    }

    function updateBestScore() {
      const best = getBestScore();
      bestValue.textContent = best;
    }

    function saveBestScoreIfNeeded() {
      const best = getBestScore();
      if (score > best) {
        localStorage.setItem(bestKey, score);
      }
      updateBestScore();
    }

    function createBackgroundStuff() {
      stars = [];
      for (let i = 0; i < 70; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * (canvas.height * 0.6),
          r: Math.random() * 2 + 0.5,
          a: Math.random() * 0.8 + 0.2
        });
      }

      clouds = [];
      for (let i = 0; i < 6; i++) {
        clouds.push({
          x: i * 180 + Math.random() * 80,
          y: 40 + Math.random() * 140,
          s: 0.7 + Math.random() * 0.8
        });
      }
    }

    function resetGameState() {
      score = 0;
      level = 1;
      frame = 0;
      speed = 3.4;
      scoreValue.textContent = "0";
      levelValue.textContent = "1";

      bird.y = 260;
      bird.velocity = 0;
      bird.angle = 0;

      pipes = [];
      createBackgroundStuff();
    }

    function startGame() {
      cancelAnimationFrame(animationId);
      resetGameState();
      running = true;
      startOverlay.classList.add("hidden");
      gameOverOverlay.classList.add("hidden");
      loop();
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(animationId);
      saveBestScoreIfNeeded();
      spawnBurst(bird.x, bird.y, 24);

      gameOverText.innerHTML = `
        Dein Score: <b>${score}</b><br>
        Best Score: <b>${getBestScore()}</b><br>
        Level: <b>${level}</b>
      `;
      gameOverOverlay.classList.remove("hidden");
    }

    function flap() {
      if (!running) return;
      bird.velocity = flapPower;
      spawnBurst(bird.x - 8, bird.y + 10, 10);
    }

    function spawnPipe() {
      const gap = Math.max(135, 170 - level * 4);
      const topHeight = 70 + Math.random() * 210;

      pipes.push({
        x: canvas.width + 60,
        w: 92,
        top: topHeight,
        bottom: canvas.height - (topHeight + gap) - 80,
        counted: false
      });
    }

    function spawnBurst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = x + "px";
        p.style.top = y + "px";
        p.style.background = ["#ff00c8", "#00d9ff", "#00ff88", "#ffe600", "#ffffff"][Math.floor(Math.random() * 5)];
        p.style.setProperty("--dx", (Math.random() * 220 - 110) + "px");
        p.style.setProperty("--dy", (Math.random() * 220 - 110) + "px");
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 900);
      }
    }

    function update() {
      frame++;

      bird.velocity += gravity;
      bird.y += bird.velocity;
      bird.angle = Math.min(0.8, bird.velocity * 0.05);

      if (frame % Math.max(80, 110 - level * 3) === 0) {
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const pipe = pipes[i];
        pipe.x -= speed;

        if (!pipe.counted && pipe.x + pipe.w < bird.x) {
          pipe.counted = true;
          score++;
          scoreValue.textContent = score;

          if (score % 5 === 0) {
            level++;
            levelValue.textContent = level;
            speed = Math.min(7.5, speed + 0.35);
            spawnBurst(canvas.width * 0.5, 80, 18);
          }
        }

        if (pipe.x + pipe.w < -20) {
          pipes.splice(i, 1);
        }
      }

      for (const cloud of clouds) {
        cloud.x -= 0.35 * cloud.s;
        if (cloud.x < -120) {
          cloud.x = canvas.width + 100;
          cloud.y = 40 + Math.random() * 140;
        }
      }

      // Boden / Decke
      if (bird.y - bird.h / 2 < 0 || bird.y + bird.h / 2 > canvas.height - 80) {
        endGame();
        return;
      }

      // Pipe Kollision
      for (const pipe of pipes) {
        const birdLeft = bird.x - bird.w / 2 + 8;
        const birdRight = bird.x + bird.w / 2 - 8;
        const birdTop = bird.y - bird.h / 2 + 10;
        const birdBottom = bird.y + bird.h / 2 - 10;

        const hitPipeX = birdRight > pipe.x && birdLeft < pipe.x + pipe.w;
        const hitTopPipe = birdTop < pipe.top;
        const hitBottomPipe = birdBottom > canvas.height - pipe.bottom - 80;

        if (hitPipeX && (hitTopPipe || hitBottomPipe)) {
          endGame();
          return;
        }
      }
    }

    function drawBackground() {
      // Sky gradient
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#1e003a");
      g.addColorStop(0.4, "#42006e");
      g.addColorStop(1, "#1c0030");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Stars
      for (const s of stars) {
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Moon
      ctx.fillStyle = "rgba(255,255,210,0.95)";
      ctx.beginPath();
      ctx.arc(780, 90, 46, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(30,0,58,0.85)";
      ctx.beginPath();
      ctx.arc(798, 84, 40, 0, Math.PI * 2);
      ctx.fill();

      // Clouds
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      for (const c of clouds) {
        drawCloud(c.x, c.y, c.s);
      }

      // City silhouette
      ctx.fillStyle = "rgba(0,0,0,0.32)";
      for (let i = 0; i < canvas.width; i += 80) {
        const h = 60 + ((i * 37) % 120);
        ctx.fillRect(i, canvas.height - 80 - h, 60, h);
      }
    }

    function drawCloud(x, y, s) {
      ctx.beginPath();
      ctx.arc(x, y, 20 * s, 0, Math.PI * 2);
      ctx.arc(x + 20 * s, y - 10 * s, 16 * s, 0, Math.PI * 2);
      ctx.arc(x + 45 * s, y, 22 * s, 0, Math.PI * 2);
      ctx.arc(x + 24 * s, y + 8 * s, 18 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      // Neon ground
      const groundY = canvas.height - 80;
      const gg = ctx.createLinearGradient(0, groundY, 0, canvas.height);
      gg.addColorStop(0, "#ff00c8");
      gg.addColorStop(1, "#2b002d");
      ctx.fillStyle = gg;
      ctx.fillRect(0, groundY, canvas.width, 80);

      // top line glow
      ctx.strokeStyle = "#00eaff";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();

      // floor grid
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x + (frame * speed % 50), groundY);
        ctx.lineTo(x + (frame * speed % 50) - 35, canvas.height);
        ctx.stroke();
      }
    }

    function drawPipe(pipe) {
      const topPipeBottom = pipe.top;
      const bottomPipeTop = canvas.height - pipe.bottom - 80;

      const grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.w, 0);
      grad.addColorStop(0, "#00ff88");
      grad.addColorStop(0.5, "#00d9ff");
      grad.addColorStop(1, "#00ff88");

      ctx.fillStyle = grad;

      // top pipe
      ctx.fillRect(pipe.x, 0, pipe.w, topPipeBottom);
      ctx.fillRect(pipe.x - 8, topPipeBottom - 24, pipe.w + 16, 24);

      // bottom pipe
      ctx.fillRect(pipe.x, bottomPipeTop, pipe.w, pipe.bottom);
      ctx.fillRect(pipe.x - 8, bottomPipeTop, pipe.w + 16, 24);

      ctx.strokeStyle = "rgba(255,255,255,0.28)";
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x, 0, pipe.w, topPipeBottom);
      ctx.strokeRect(pipe.x, bottomPipeTop, pipe.w, pipe.bottom);
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.angle);

      // glow
      ctx.shadowColor = "#ff00c8";
      ctx.shadowBlur = 24;

      // body
      const bodyGrad = ctx.createLinearGradient(-30, -20, 30, 20);
      bodyGrad.addColorStop(0, "#ffd0dc");
      bodyGrad.addColorStop(1, "#ff77aa");
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 30, 24, 0, 0, Math.PI * 2);
      ctx.fill();

      // ears
      ctx.fillStyle = "#ff99bb";
      ctx.beginPath();
      ctx.arc(-12, -22, 8, 0, Math.PI * 2);
      ctx.arc(8, -22, 8, 0, Math.PI * 2);
      ctx.fill();

      // eyes
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(-8, -3, 3, 0, Math.PI * 2);
      ctx.arc(8, -3, 3, 0, Math.PI * 2);
      ctx.fill();

      // snout
      ctx.fillStyle = "#ffb6c9";
      ctx.beginPath();
      ctx.ellipse(0, 10, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(-4, 10, 1.8, 0, Math.PI * 2);
      ctx.arc(4, 10, 1.8, 0, Math.PI * 2);
      ctx.fill();

      // wing
      ctx.fillStyle = "#ff4f97";
      ctx.beginPath();
      ctx.ellipse(-6, 8, 10, 6, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // beak/meme mouth style
      ctx.fillStyle = "#ffe766";
      ctx.beginPath();
      ctx.moveTo(26, 6);
      ctx.lineTo(40, 0);
      ctx.lineTo(26, -4);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawScoreFlash() {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.font = "bold 70px Arial";
      ctx.textAlign = "center";
      ctx.fillText(score, canvas.width / 2, 90);
      ctx.textAlign = "start";
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground();

      for (const pipe of pipes) {
        drawPipe(pipe);
      }

      drawGround();
      drawBird();
      drawScoreFlash();
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      animationId = requestAnimationFrame(loop);
    }

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("restartBtn").addEventListener("click", startGame);

    canvas.addEventListener("click", () => {
      if (running) flap();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (running) {
          flap();
        } else if (startOverlay.classList.contains("hidden") === false) {
          startGame();
        }
      }
    });

    updateBestScore();
    createBackgroundStuff();
    draw();
  </script>
</body>
</html>
