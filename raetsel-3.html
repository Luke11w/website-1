<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Pork Rätsel 3</title>
  <link rel="stylesheet" href="css/ultra-raetsel.css">
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="overlay-flash" id="overlayFlash"></div>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">💀 Brainrot Chamber</div>
      <a class="top-link" href="index.html">⬅ Startseite</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card" id="quizCard">
      <h1>⚡ LEVEL 3</h1>

      <div class="badge-row">
        <div class="badge">Halbzeit</div>
        <div class="badge lives" id="livesText">❤️ Leben: 3</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Fortschritt: 3 von 5</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <h2 id="questionTitle">Rätsel 3 / 5</h2>

      <div class="question-shell">
        <div class="question-box" id="questionText"></div>
      </div>

      <div class="input-row">
        <input type="text" id="answerInput" placeholder="Antwort eingeben">
        <button class="btn" id="checkBtn">Prüfen</button>
      </div>

      <div class="result" id="resultText"></div>
    </div>
  </div>

  <script src="js/ultra-raetsel-core.js"></script>
  <script>
    startAmbientEffects();
    spawnParticles();
    loadStepPage(3);
  </script>
</body>
</html>
