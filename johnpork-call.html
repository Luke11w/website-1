<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Pork Call Mode</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Comic Sans MS, Arial, sans-serif;
      background:
        radial-gradient(circle at top, #5a0099 0%, #250044 35%, #0a0014 70%, #000 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 20px;
    }

    .phone-screen {
      width: 100%;
      max-width: 440px;
      min-height: 92vh;
      background: linear-gradient(180deg, #180033, #0c0018);
      border: 4px solid #ffea00;
      border-radius: 34px;
      box-shadow: 0 0 45px rgba(255, 234, 0, 0.35);
      overflow: hidden;
      position: relative;
    }

    .topbar {
      background: rgba(255,255,255,0.08);
      padding: 16px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      text-shadow: 0 0 15px #ff4d4d;
    }

    .status {
      font-size: 14px;
      color: #ffd900;
      margin-top: 6px;
    }

    .call-area {
      padding: 20px 16px 140px 16px;
    }

    .john-box {
      text-align: center;
      margin-bottom: 18px;
    }

    .john-img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 0 30px rgba(255,255,255,0.45);
      background: #222;
    }

    .john-name {
      margin-top: 12px;
      font-size: 30px;
      font-weight: bold;
      text-shadow: 0 0 15px #ff4d4d;
    }

    .john-sub {
      color: #ffea00;
      font-size: 16px;
      margin-top: 6px;
    }

    .meter-wrap {
      margin-top: 14px;
      padding: 0 12px;
    }

    .meter-label {
      font-size: 14px;
      color: #fff;
      margin-bottom: 6px;
    }

    .meter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.12);
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, lime, yellow, orange, red);
      transition: width 0.35s ease;
    }

    .chat-box {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .chat-box::-webkit-scrollbar {
      width: 8px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
    }

    .bubble {
      max-width: 86%;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 18px;
      line-height: 1.4;
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
      animation: popIn 0.25s ease;
      word-break: break-word;
    }

    .john {
      align-self: flex-start;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.15);
    }

    .user {
      align-self: flex-end;
      background: #ffea00;
      color: black;
      font-weight: bold;
    }

    .system {
      align-self: center;
      background: rgba(255, 77, 77, 0.18);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 15px;
      color: #ffd7d7;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.96), rgba(0,0,0,0.75));
      border-top: 2px solid rgba(255,255,255,0.08);
    }

    .question-label {
      text-align: center;
      font-size: 16px;
      color: #ffea00;
      margin-bottom: 12px;
      min-height: 22px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 16px 10px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }

    .yes-btn {
      background: #40ff77;
      color: black;
      box-shadow: 0 0 20px rgba(64,255,119,0.35);
    }

    .no-btn {
      background: #ff4d4d;
      color: white;
      box-shadow: 0 0 20px rgba(255,77,77,0.35);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .home-link {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 12px;
    }

    .home-link:hover {
      color: #ffea00;
    }

    .hidden {
      display: none;
    }

    .end-screen {
      margin-top: 18px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    .ring {
      animation: ringPulse 1s infinite;
    }

    @keyframes ringPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .rage-mode {
      box-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
      border-color: #ff3b3b;
    }

    @media (max-width: 500px) {
      .topbar h1 {
        font-size: 24px;
      }

      .john-name {
        font-size: 24px;
      }

      .bubble {
        font-size: 16px;
      }

      .btn {
        font-size: 18px;
        padding: 14px 8px;
      }

      .john-img {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-screen ring" id="phoneScreen">
    <div class="topbar">
      <h1>📞 JOHN PORK CALL MODE</h1>
      <div class="status" id="statusText">eingehender anruf...</div>
    </div>

    <div class="call-area">
      <div class="john-box">
        <img class="john-img" src="john-pork-call.png" alt="John Pork">
        <div class="john-name">John Pork</div>
        <div class="john-sub">hat Fragen. sehr viele Fragen.</div>
        <a class="home-link" href="index.html">⬅ zurück zur Startseite</a>

        <div class="meter-wrap">
          <div class="meter-label">John Pork Wut-Level</div>
          <div class="meter">
            <div class="meter-fill" id="rageFill"></div>
          </div>
        </div>
      </div>

      <div class="chat-box" id="chatBox">
        <div class="bubble john">📞 John Pork ruft dich an...</div>
      </div>

      <div class="end-screen hidden" id="endScreen">
        <h2 id="endTitle">💀 Gespräch beendet</h2>
        <p id="endText">John Pork hat aufgelegt.</p>
        <a class="home-link" href="johnpork-call.html">🔁 Nochmal spielen</a>
      </div>
    </div>

    <div class="controls" id="controls">
      <div class="question-label" id="questionLabel">Nimmst du ab?</div>
      <div class="btn-row">
        <button class="btn yes-btn" id="yesBtn">JA</button>
        <button class="btn no-btn" id="noBtn">NEIN</button>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const questionLabel = document.getElementById("questionLabel");
    const statusText = document.getElementById("statusText");
    const controls = document.getElementById("controls");
    const endScreen = document.getElementById("endScreen");
    const endTitle = document.getElementById("endTitle");
    const endText = document.getElementById("endText");
    const phoneScreen = document.getElementById("phoneScreen");
    const rageFill = document.getElementById("rageFill");

    let step = 0;
    let rage = 0;
    let loyalty = 0;
    let brainrot = 0;

    const questions = [
      {
        john: "Du hast endlich abgenommen. Hast du absichtlich 73 Anrufe ignoriert?",
        yesText: "JA, vielleicht",
        noText: "NEIN, natürlich nicht",
        yesEffects: { rage: 2, brainrot: 1 },
        noEffects: { loyalty: 1 },
        yesNext: 1,
        noNext: 1
      },
      {
        john: "Hast du mich schon mal in deinem Kopf 'John Park' genannt?",
        yesText: "JA, aus Versehen",
        noText: "NEIN, niemals",
        yesEffects: { rage: 3 },
        noEffects: { loyalty: 2 },
        yesNext: 2,
        noNext: 2
      },
      {
        john: "Bist du bereit, dem Pork-Imperium beizutreten?",
        yesText: "JA, ich bin bereit",
        noText: "NEIN, eher nicht",
        yesEffects: { loyalty: 2, brainrot: 2 },
        noEffects: { rage: 2 },
        yesNext: 3,
        noNext: 3
      },
      {
        john: "Würdest du nachts um 3 Uhr ein cursed Pork-Game spielen?",
        yesText: "JA, sofort",
        noText: "NEIN, ich schlafe",
        yesEffects: { brainrot: 2, loyalty: 1 },
        noEffects: { rage: 1 },
        yesNext: 4,
        noNext: 4
      },
      {
        john: "Wenn ich sage 'komm ins Pork-Universum', kommst du dann?",
        yesText: "JA",
        noText: "NEIN",
        yesEffects: { loyalty: 2 },
        noEffects: { rage: 2, brainrot: 1 },
        yesNext: 5,
        noNext: 5
      },
      {
        john: "Hast du meine Pork Games schon gespielt?",
        yesText: "JA, mehrere",
        noText: "NEIN, noch nicht",
        yesEffects: { loyalty: 2 },
        noEffects: { rage: 1 },
        yesNext: 6,
        noNext: 6
      },
      {
        john: "Welche Antwort würde ein echter Pork-Boss geben?",
        yesText: "JA",
        noText: "NEIN",
        yesEffects: { loyalty: 1, brainrot: 1 },
        noEffects: { rage: 1 },
        yesNext: 7,
        noNext: 7
      },
      {
        john: "Würdest du meine Socken aus dem Shop tragen?",
        yesText: "JA, mit Stolz",
        noText: "NEIN, niemals",
        yesEffects: { loyalty: 2, brainrot: 1 },
        noEffects: { rage: 2 },
        yesNext: 8,
        noNext: 8
      },
      {
        john: "Denkst du, dass du dem Brainrot noch entkommen kannst?",
        yesText: "JA, vielleicht",
        noText: "NEIN, ich bin verloren",
        yesEffects: { rage: 1 },
        noEffects: { brainrot: 2, loyalty: 1 },
        yesNext: 9,
        noNext: 9
      },
      {
        john: "Letzte Frage... bist du bereit, ein offizieller Teil von John Pork zu werden?",
        yesText: "JA, ich akzeptiere",
        noText: "NEIN, ich lehne ab",
        yesEffects: { loyalty: 3, brainrot: 2 },
        noEffects: { rage: 3 },
        yesNext: "finish",
        noNext: "finish"
      }
    ];

    function addBubble(text, type) {
      const bubble = document.createElement("div");
      bubble.className = "bubble " + type;
      bubble.textContent = text;
      chatBox.appendChild(bubble);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addSystem(text) {
      addBubble(text, "system");
    }

    function updateRageBar() {
      let ragePercent = Math.min((rage / 15) * 100, 100);
      rageFill.style.width = ragePercent + "%";

      if (rage >= 8) {
        phoneScreen.classList.add("rage-mode");
        statusText.textContent = "john pork wird wütend...";
      }
    }

    function showQuestion() {
      if (!questions[step]) return;

      setTimeout(() => {
        addBubble(questions[step].john, "john");
        questionLabel.textContent = "Deine Antwort:";
      }, 500);
    }

    function applyEffects(effects) {
      if (!effects) return;
      rage += effects.rage || 0;
      loyalty += effects.loyalty || 0;
      brainrot += effects.brainrot || 0;
      updateRageBar();
    }

    function getEnding() {
      if (rage >= 9) {
        return {
          title: "💀 BÖSES ENDE",
          text: "John Pork ist komplett ausgerastet. Das Gespräch endet in maximalem Chaos. Du hörst nur noch wütendes Schweine-Atmen.",
          messages: [
            "📞 John Pork: DU HÄTTEST FRÜHER ABNEHMEN SOLLEN.",
            "💀 Die Leitung glitcht. Irgendwo kracht etwas um.",
            "📵 Gespräch zwangsweise beendet."
          ]
        };
      }

      if (loyalty >= 8 && brainrot >= 6) {
        return {
          title: "👑 PORK BOSS ENDE",
          text: "John Pork akzeptiert dich als legendären Brainrot-Boss. Du bist jetzt Teil des inneren Pork-Kreises.",
          messages: [
            "📞 John Pork: Beeindruckend. Du bist loyal... und komplett brainrot.",
            "👑 Willkommen im geheimen Pork-Imperium.",
            "✨ Gespräch erfolgreich abgeschlossen."
          ]
        };
      }

      if (loyalty >= 7) {
        return {
          title: "✅ GUTES ENDE",
          text: "John Pork vertraut dir. Du bist offiziell ein Freund des Pork-Universums.",
          messages: [
            "📞 John Pork: Nicht schlecht. Du hast Potenzial.",
            "🐷 Vielleicht rufe ich dich wieder an.",
            "📴 Gespräch freundlich beendet."
          ]
        };
      }

      if (brainrot >= 7) {
        return {
          title: "🧠 BRAINROT ENDE",
          text: "Du bist komplett im Brainrot versunken. John Pork findet das irgendwie stark.",
          messages: [
            "📞 John Pork: Dein Zustand ist kritisch... aber auf gute Art.",
            "🧠 Brainrot-Level maximal erreicht.",
            "📞 John Pork kichert und legt auf."
          ]
        };
      }

      return {
        title: "😵 CHAOS ENDE",
        text: "Niemand weiß genau, was dieses Gespräch war. Aber es war definitiv cursed.",
        messages: [
          "📞 John Pork: Hm... seltsame Antworten.",
          "🌫️ Die Leitung rauscht merkwürdig.",
          "📴 Gespräch beendet."
        ]
      };
    }

    function finishGame() {
      controls.classList.add("hidden");
      endScreen.classList.remove("hidden");
      statusText.textContent = "gespräch beendet";
      phoneScreen.classList.remove("ring");

      const ending = getEnding();

      endTitle.textContent = ending.title;
      endText.textContent =
        ending.text +
        " | Wut: " + rage +
        " | Loyalität: " + loyalty +
        " | Brainrot: " + brainrot;

      setTimeout(() => addBubble(ending.messages[0], "john"), 300);
      setTimeout(() => addBubble(ending.messages[1], "john"), 900);
      setTimeout(() => addBubble(ending.messages[2], "system"), 1500);
    }

    function answer(isYes) {
      if (!questions[step]) return;

      const current = questions[step];
      const userText = isYes ? current.yesText : current.noText;
      const next = isYes ? current.yesNext : current.noNext;
      const effects = isYes ? current.yesEffects : current.noEffects;

      addBubble(userText, "user");
      applyEffects(effects);

      if (step === 0) {
        statusText.textContent = "verbunden mit John Pork";
        phoneScreen.classList.remove("ring");
        addSystem("verbindung stabilisiert...");
      }

      if (step === 1 && rage >= 4) {
        setTimeout(() => addBubble("📞 John Pork: Pass auf, wie du mit mir redest.", "john"), 500);
      }

      if (step === 4 && loyalty >= 4) {
        setTimeout(() => addBubble("📞 John Pork: Hm. Vielleicht bist du doch brauchbar.", "john"), 500);
      }

      if (step === 7 && brainrot >= 5) {
        setTimeout(() => addBubble("🧠 System: kritische Brainrot-Werte erkannt.", "system"), 500);
      }

      if (next === "finish") {
        step = next;
        setTimeout(() => finishGame(), 900);
        return;
      }

      step = next;
      setTimeout(() => showQuestion(), 700);
    }

    yesBtn.addEventListener("click", () => answer(true));
    noBtn.addEventListener("click", () => answer(false));

    setTimeout(() => {
      addBubble("📞 Unbekannte Schweine-Energie erkannt...", "john");
    }, 900);

    setTimeout(() => {
      addBubble("John Pork: Diesmal kommst du mir nicht mehr aus.", "john");
    }, 1700);

    setTimeout(() => {
      addSystem("anruf angenommen? entscheidung ausstehend...");
    }, 2400);
  </script>
</body>
</html>
