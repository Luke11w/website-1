<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake = [{ x: 10, y: 10 }];
  let dx = 1;
  let dy = 0;

  let food = { x: 5, y: 5 };
  let score = 0;
  let gameRunning = false;
  let interval = null;

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") setDirection("up");
    if (e.key === "ArrowDown") setDirection("down");
    if (e.key === "ArrowLeft") setDirection("left");
    if (e.key === "ArrowRight") setDirection("right");
  });

  function setDirection(dir) {
    if (!gameRunning) return;

    if (dir === "up" && dy !== 1) {
      dx = 0;
      dy = -1;
    } else if (dir === "down" && dy !== -1) {
      dx = 0;
      dy = 1;
    } else if (dir === "left" && dx !== 1) {
      dx = -1;
      dy = 0;
    } else if (dir === "right" && dx !== -1) {
      dx = 1;
      dy = 0;
    }
  }

  function randomFood() {
    food = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount)
    };

    for (let part of snake) {
      if (part.x === food.x && part.y === food.y) {
        randomFood();
        return;
      }
    }
  }

  function drawBrainrot(x, y) {
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(
      x * gridSize + gridSize / 2,
      y * gridSize + gridSize / 2,
      8,
      0,
      Math.PI * 2
    );
    ctx.fill();

    ctx.font = "12px Arial";
    ctx.fillText("🧠", x * gridSize + 2, y * gridSize + 14);
  }

  function drawJohnPork(x, y, head = false) {
    ctx.fillStyle = head ? "hotpink" : "#ffb6c1";
    ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);

    if (head) {
      ctx.fillStyle = "black";
      ctx.fillRect(x * gridSize + 4, y * gridSize + 5, 3, 3);
      ctx.fillRect(x * gridSize + 13, y * gridSize + 5, 3, 3);
      ctx.fillRect(x * gridSize + 7, y * gridSize + 12, 6, 3);
    }
  }

  function startGame() {
    if (interval) {
      clearInterval(interval);
    }

    snake = [{ x: 10, y: 10 }];
    dx = 1;
    dy = 0;
    score = 0;
    document.getElementById("score").innerText = "Score: 0";
    randomFood();
    gameRunning = true;

    interval = setInterval(gameLoop, 110);
  }

  function update() {
    if (!gameRunning) return;

    const head = {
      x: snake[0].x + dx,
      y: snake[0].y + dy
    };

    if (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount) {
      gameRunning = false;
      clearInterval(interval);
      interval = null;
      setTimeout(() => {
        alert("💀 GAME OVER 💀\nDrücke Start für neue Runde\nScore: " + score);
      }, 50);
      return;
    }

    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameRunning = false;
        clearInterval(interval);
        interval = null;
        setTimeout(() => {
          alert("💀 GAME OVER 💀\nDrücke Start für neue Runde\nScore: " + score);
        }, 50);
        return;
      }
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      randomFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawBrainrot(food.x, food.y);

    for (let i = 0; i < snake.length; i++) {
      drawJohnPork(snake[i].x, snake[i].y, i === 0);
    }
  }

  function gameLoop() {
    update();
    draw();
  }

  randomFood();
  draw();
</script>
