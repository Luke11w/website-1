
   <!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOHN PORK SNAKE</title>
  <style>
    body {
      margin: 0;
      font-family: Comic Sans MS, Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(45deg, black, purple, red, blue);
      background-size: 400% 400%;
      animation: bg 6s infinite;
      min-height: 100vh;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrap {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 30px red;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 15px white;
    }

    canvas {
      background: #111;
      border: 4px solid hotpink;
      border-radius: 16px;
      margin-top: 15px;
    }

    button {
      margin-top: 15px;
      padding: 14px 22px;
      background: yellow;
      color: black;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: orange;
    }

    #score {
      font-size: 24px;
      color: lime;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>🐍 JOHN PORK SNAKE 🐷</h1>
    <p>Steuerung: Pfeiltasten ⬅️➡️⬆️⬇️</p>
    <p>Friss Brainrot 🧠 und werde länger 💀</p>

    <div id="score">Score: 0</div>

    <canvas id="game" width="400" height="400"></canvas>

    <br>
    <button onclick="startGame()">▶️ Start</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{ x: 10, y: 10 }];
    let dx = 1;
    let dy = 0;

    let food = { x: 5, y: 5 };
    let score = 0;
    let interval = null;
    let gameRunning = false;

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") setDirection("up");
      if (e.key === "ArrowDown") setDirection("down");
      if (e.key === "ArrowLeft") setDirection("left");
      if (e.key === "ArrowRight") setDirection("right");
    });

    function setDirection(dir) {
      if (!gameRunning) return;

      if (dir === "up" && dy !== 1) {
        dx = 0;
        dy = -1;
      } else if (dir === "down" && dy !== -1) {
        dx = 0;
        dy = 1;
      } else if (dir === "left" && dx !== 1) {
        dx = -1;
        dy = 0;
      } else if (dir === "right" && dx !== -1) {
        dx = 1;
        dy = 0;
      }
    }

    function randomFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
    }

    function startGame() {
      if (interval) clearInterval(interval);

      snake = [{ x: 10, y: 10 }];
      dx = 1;
      dy = 0;
      score = 0;
      document.getElementById("score").innerText = "Score: 0";
      randomFood();

      gameRunning = true;
      interval = setInterval(gameLoop, 110);
    }

    function update() {
      if (!gameRunning) return;

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      // Wand oder Selbst getroffen
      if (
        head.x < 0 || head.y < 0 ||
        head.x >= tileCount || head.y >= tileCount ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameRunning = false;
        clearInterval(interval);
        interval = null;

        setTimeout(() => {
          alert("💀 GAME OVER 💀\nDrücke Start für neue Runde\nScore: " + score);
        }, 50);

        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        randomFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Food (Brainrot)
      ctx.fillStyle = "lime";
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

      // Snake (John Pork Style)
      ctx.fillStyle = "hotpink";
      snake.forEach(part => {
        ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
      });
    }

    function gameLoop() {
      update();
      draw();
    }

    randomFood();
    draw();
  </script>

</body>
</html>
