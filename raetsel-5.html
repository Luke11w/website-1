<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rätsel 5</title>
  <link rel="stylesheet" href="css/raetsel.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">🐷 John Pork Rätsel</div>
      <a class="back-link" href="index.html">⬅ Startseite</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card" id="quizCard">
      <h1>🏁 Finale</h1>

      <div class="badge-row">
        <div class="badge">Level 5</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Fortschritt: 5 von 5</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <h2 id="questionTitle">Rätsel 5 / 5</h2>
      <div class="question-box" id="questionText">Frage lädt...</div>

      <div class="input-row">
        <input type="text" id="answerInput" placeholder="Antwort eingeben">
        <button class="btn" id="checkBtn">Prüfen</button>
      </div>

      <div class="result" id="resultText"></div>
    </div>
  </div>

  <script src="js/raetsel.js"></script>
  <script>
    loadQuestionPage(5);
  </script>
</body>
</html>
