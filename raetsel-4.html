<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Pork Rätsel 4</title>
  <link rel="stylesheet" href="css/ultra-raetsel.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">🔥 Pork Chaos Core</div>
      <a class="top-link" href="index.html">⬅ Startseite</a>
    </div>
  </div>

  <div class="wrap">
    <div class="box" id="quizBox">
      <h1>😈 FAST GESCHAFFT</h1>
      <div class="badge">Level 4 aktiv</div>

      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Fortschritt: 4 von 5</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <h2 id="questionTitle">Rätsel 4 / 5</h2>
      <div class="question-box" id="questionText"></div>

      <div class="input-row">
        <input type="text" id="answerInput" placeholder="Antwort eingeben">
        <button class="btn" id="checkBtn">Prüfen</button>
      </div>

      <div class="result" id="resultText"></div>
    </div>
  </div>

  <script src="js/ultra-raetsel-flow.js"></script>
  <script>
    startAmbientEffects();
    loadStep(4);
  </script>
</body>
</html>
