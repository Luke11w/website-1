<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Pork Tire Throw</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #87ceeb 0%, #bfe7ff 48%, #7fc96a 48%, #5a9a48 100%);
      color: white;
      text-align: center;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 20px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    p {
      margin-top: 0;
      color: #f5f5f5;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 14px 0 18px;
    }

    .card {
      background: rgba(0,0,0,0.45);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 150px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.2);
    }

    .big {
      font-size: 24px;
      font-weight: bold;
    }

    .controls {
      margin-bottom: 16px;
    }

    button, a.btn-link {
      display: inline-block;
      padding: 14px 22px;
      margin: 6px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ffd84d;
      color: #111;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
      text-decoration: none;
    }

    button:hover, a.btn-link:hover {
      transform: translateY(-1px);
      background: #ffca1a;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    canvas {
      width: 100%;
      max-width: 1020px;
      height: auto;
      background: transparent;
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    }

    .hint {
      margin-top: 12px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🛞 John Pork Tire Throw</h1>
    <p>
      Erst <b>Start</b>, dann <b>Power stoppen</b>, dann <b>Winkel stoppen</b>.<br>
      Danach fliegt der Reifen automatisch los.
    </p>

    <div class="hud">
      <div class="card">
        <div>Power</div>
        <div class="big" id="powerValue">0%</div>
      </div>
      <div class="card">
        <div>Winkel</div>
        <div class="big" id="angleValue">0°</div>
      </div>
      <div class="card">
        <div>Resultat</div>
        <div class="big" id="resultValue">-</div>
      </div>
      <div class="card">
        <div>Status</div>
        <div class="big" id="statusValue">Bereit</div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" onclick="startAim()">▶️ Start</button>
      <button id="lockPowerBtn" onclick="lockPower()" disabled>⚡ Power stoppen</button>
      <button id="lockAngleBtn" onclick="lockAngle()" disabled>🎯 Winkel stoppen</button>
      <button onclick="resetRound()">🔄 Reset</button>
      <a class="btn-link" href="index.html">⬅️ Zur Hauptseite</a>
    </div>

    <canvas id="game" width="1020" height="580"></canvas>

    <div class="hint">
      Grün markiert = guter Bereich.<br>
      Power und Winkel werden jetzt einzeln gestoppt.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const powerValue = document.getElementById("powerValue");
    const angleValue = document.getElementById("angleValue");
    const resultValue = document.getElementById("resultValue");
    const statusValue = document.getElementById("statusValue");

    const startBtn = document.getElementById("startBtn");
    const lockPowerBtn = document.getElementById("lockPowerBtn");
    const lockAngleBtn = document.getElementById("lockAngleBtn");

    const johnPorkImg = new Image();
    johnPorkImg.src = "Screenshot 2026-03-20 173804.png";

    const targetImg = new Image();
    targetImg.src = "Screenshot 2026-03-20 173621.png";

    let phase = "idle"; // idle, aiming, flying, done
    let aimAnimation = null;
    let flightAnimation = null;

    let power = 0;
    let powerDir = 1;
    let angle = 15;
    let angleDir = 1;

    let powerLocked = false;
    let angleLocked = false;

    let tire = {
      x: 235,
      y: 395,
      vx: 0,
      vy: 0,
      rotation: 0,
      spinning: 0,
      flying: false
    };

    const launchPoint = { x: 235, y: 395 };
    const target = { x: 820, y: 300, w: 130, h: 130 };

    function updateHud() {
      powerValue.textContent = Math.round(power) + "%";
      angleValue.textContent = Math.round(angle) + "°";
    }

    function startAim() {
      cancelAnimationFrame(aimAnimation);
      cancelAnimationFrame(flightAnimation);

      phase = "aiming";
      resultValue.textContent = "-";
      statusValue.textContent = "Power wählen";

      power = 0;
      powerDir = 1;
      angle = 15;
      angleDir = 1;
      powerLocked = false;
      angleLocked = false;

      tire = {
        x: launchPoint.x,
        y: launchPoint.y,
        vx: 0,
        vy: 0,
        rotation: 0,
        spinning: 0,
        flying: false
      };

      startBtn.disabled = true;
      lockPowerBtn.disabled = false;
      lockAngleBtn.disabled = true;

      updateHud();
      animateAim();
    }

    function lockPower() {
      if (phase !== "aiming" || powerLocked) return;
      powerLocked = true;
      lockPowerBtn.disabled = true;
      lockAngleBtn.disabled = false;
      statusValue.textContent = "Winkel wählen";
    }

    function lockAngle() {
      if (phase !== "aiming" || !powerLocked || angleLocked) return;
      angleLocked = true;
      lockAngleBtn.disabled = true;
      statusValue.textContent = "Wurf läuft";
      launchTire();
    }

    function resetRound() {
      cancelAnimationFrame(aimAnimation);
      cancelAnimationFrame(flightAnimation);

      phase = "idle";
      power = 0;
      angle = 15;
      powerLocked = false;
      angleLocked = false;

      tire = {
        x: launchPoint.x,
        y: launchPoint.y,
        vx: 0,
        vy: 0,
        rotation: 0,
        spinning: 0,
        flying: false
      };

      resultValue.textContent = "-";
      statusValue.textContent = "Bereit";

      startBtn.disabled = false;
      lockPowerBtn.disabled = true;
      lockAngleBtn.disabled = true;

      updateHud();
      drawScene();
    }

    function animateAim() {
      if (phase !== "aiming") return;

      if (!powerLocked) {
        power += powerDir * 1.8;
        if (power >= 100) {
          power = 100;
          powerDir = -1;
        }
        if (power <= 0) {
          power = 0;
          powerDir = 1;
        }
      }

      if (powerLocked && !angleLocked) {
        angle += angleDir * 0.9;
        if (angle >= 75) {
          angle = 75;
          angleDir = -1;
        }
        if (angle <= 10) {
          angle = 10;
          angleDir = 1;
        }
      }

      updateHud();
      drawScene();
      aimAnimation = requestAnimationFrame(animateAim);
    }

    function launchTire() {
      phase = "flying";
      cancelAnimationFrame(aimAnimation);

      const speed = 8 + (power / 100) * 12;
      const rad = (angle * Math.PI) / 180;

      tire.x = launchPoint.x;
      tire.y = launchPoint.y;
      tire.vx = Math.cos(rad) * speed;
      tire.vy = -Math.sin(rad) * speed * 1.15;
      tire.rotation = 0;
      tire.spinning = 0.3 + power / 240;
      tire.flying = true;

      animateFlight();
    }

    function animateFlight() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawGround();
      drawMotorcycle();
      drawTarget();
      drawMeters();

      tire.x += tire.vx;
      tire.y += tire.vy;
      tire.vy += 0.30;
      tire.rotation += tire.spinning;

      drawTire(tire.x, tire.y, tire.rotation);

      const hit =
        tire.x > target.x &&
        tire.x < target.x + target.w &&
        tire.y > target.y &&
        tire.y < target.y + target.h;

      const out =
        tire.x > canvas.width + 60 ||
        tire.y > canvas.height + 60 ||
        tire.y < -80;

      if (hit) {
        phase = "done";
        resultValue.textContent = "TREFFER";
        statusValue.textContent = "Gewonnen";
        startBtn.disabled = false;
        drawExplosion(target.x + target.w / 2, target.y + target.h / 2);
        return;
      }

      if (out) {
        phase = "done";
        resultValue.textContent = "MISS";
        statusValue.textContent = "Verfehlt";
        startBtn.disabled = false;
        drawScene();
        return;
      }

      flightAnimation = requestAnimationFrame(animateFlight);
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawGround();
      drawMotorcycle();
      drawTarget();
      drawMeters();

      if (!tire.flying) {
        drawTire(launchPoint.x, launchPoint.y, 0);
      }
    }

    function drawBackground() {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      drawCloud(130, 80, 1.0);
      drawCloud(330, 115, 0.7);
      drawCloud(760, 95, 0.95);
    }

    function drawCloud(x, y, s) {
      ctx.beginPath();
      ctx.arc(x, y, 22 * s, 0, Math.PI * 2);
      ctx.arc(x + 22 * s, y - 10 * s, 18 * s, 0, Math.PI * 2);
      ctx.arc(x + 48 * s, y, 24 * s, 0, Math.PI * 2);
      ctx.arc(x + 24 * s, y + 8 * s, 20 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = "#6d4b2c";
      ctx.fillRect(0, 430, canvas.width, 150);

      ctx.fillStyle = "#666";
      ctx.fillRect(0, 410, canvas.width, 22);

      ctx.fillStyle = "#ddd";
      for (let i = 0; i < canvas.width; i += 95) {
        ctx.fillRect(i + 22, 417, 46, 8);
      }
    }

    function drawMotorcycle() {
      // motorcycle frame
      ctx.fillStyle = "#d62828";
      ctx.fillRect(100, 350, 90, 14);
      ctx.fillRect(145, 320, 16, 38);
      ctx.fillRect(155, 320, 60, 10);

      // seat
      ctx.fillStyle = "#222";
      ctx.fillRect(120, 305, 48, 15);

      // fork / front
      ctx.fillStyle = "#999";
      ctx.fillRect(205, 325, 8, 42);

      // back support
      ctx.fillStyle = "#888";
      ctx.fillRect(110, 332, 8, 28);

      // wheels
      drawWheel(110, 390, 34);
      drawWheel(220, 390, 34);

      // launcher arm showing angle
      const rad = (angle * Math.PI) / 180;
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(launchPoint.x, launchPoint.y);
      ctx.lineTo(
        launchPoint.x + Math.cos(rad) * 90,
        launchPoint.y - Math.sin(rad) * 90
      );
      ctx.stroke();

      // John Pork image
      if (johnPorkImg.complete) {
        ctx.drawImage(johnPorkImg, 118, 230, 95, 95);
      } else {
        ctx.fillStyle = "pink";
        ctx.fillRect(125, 235, 80, 80);
      }

      ctx.fillStyle = "#fff";
      ctx.font = "18px Arial";
      ctx.fillText("John Pork", 105, 220);
    }

    function drawWheel(x, y, r) {
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#999";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(x, y, r - 8, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "#777";
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 * i) / 8;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(a) * (r - 10), y + Math.sin(a) * (r - 10));
        ctx.stroke();
      }
    }

    function drawTire(x, y, rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(0, 0, 28, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#555";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(0, 0, 20, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "#888";
      ctx.lineWidth = 2;
      for (let i = 0; i < 12; i++) {
        ctx.rotate(Math.PI / 6);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -18);
        ctx.stroke();
      }

      // little tread marks
      ctx.strokeStyle = "#777";
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 * i) / 8;
        const x1 = Math.cos(a) * 24;
        const y1 = Math.sin(a) * 24;
        const x2 = Math.cos(a) * 28;
        const y2 = Math.sin(a) * 28;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawTarget() {
      if (targetImg.complete) {
        ctx.drawImage(targetImg, target.x, target.y, target.w, target.h);
      } else {
        ctx.fillStyle = "lime";
        ctx.fillRect(target.x, target.y, target.w, target.h);
      }

      ctx.fillStyle = "#fff";
      ctx.font = "20px Arial";
      ctx.fillText("Tum Tum Sahur", target.x - 8, target.y - 14);
    }

    function drawMeters() {
      drawMeter(
        55, 475, 300, 20,
        power / 100,
        "#ffd84d",
        "POWER",
        0.72, 0.12,
        powerLocked
      );

      drawMeter(
        390, 475, 300, 20,
        angle / 90,
        "#7be0ff",
        "WINKEL",
        0.42, 0.14,
        angleLocked
      );
    }

    function drawMeter(x, y, w, h, ratio, color, label, sweetStart, sweetWidth, locked) {
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(x, y, w, h);

      ctx.fillStyle = "rgba(0,255,0,0.28)";
      ctx.fillRect(x + w * sweetStart, y, w * sweetWidth, h);

      ctx.fillStyle = color;
      ctx.fillRect(x, y, w * ratio, h);

      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = "#fff";
      ctx.font = "15px Arial";
      ctx.fillText(label + (locked ? " ✅" : ""), x, y - 8);

      const mx = x + w * ratio;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(mx, y - 4);
      ctx.lineTo(mx - 6, y - 14);
      ctx.lineTo(mx + 6, y - 14);
      ctx.closePath();
      ctx.fill();
    }

    function drawExplosion(x, y) {
      drawScene();

      ctx.fillStyle = "rgba(255, 230, 80, 0.95)";
      for (let i = 0; i < 16; i++) {
        const a = (Math.PI * 2 * i) / 16;
        const px = x + Math.cos(a) * 34;
        const py = y + Math.sin(a) * 34;
        ctx.beginPath();
        ctx.arc(px, py, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#fff";
      ctx.font = "bold 36px Arial";
      ctx.fillText("TREFFER!", x - 82, y - 60);
    }

    updateHud();
    drawScene();
  </script>
</body>
</html>
