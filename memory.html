<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skibidi John Pork Memory</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(45deg, red, purple, blue, black);
  background-size: 400% 400%;
  animation: bg 6s infinite;
}

@keyframes bg {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

h1 {
  font-size: 40px;
  text-shadow: 0 0 20px white;
}

#moves {
  font-size: 22px;
  margin: 10px;
  color: yellow;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  max-width: 500px;
  margin: auto;
  gap: 12px;
}

.card {
  width: 100%;
  aspect-ratio: 1;
  background: black;
  border-radius: 15px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: 0.4s;
}

.card.flip {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
}

.front {
  background: hotpink;
}

.back {
  transform: rotateY(180deg);
}

.back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

.match {
  animation: glow 0.6s;
}

@keyframes glow {
  0% {box-shadow:0 0 0}
  50% {box-shadow:0 0 25px lime}
  100% {box-shadow:0 0 0}
}

button {
  margin: 15px;
  padding: 12px 20px;
  font-size: 18px;
  background: yellow;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>💀 Skibidi John Pork Memory 💀</h1>
<div id="moves">Züge: 0</div>

<button onclick="startGame()">🔄 Neustart</button>

<div class="grid" id="grid"></div>

<!-- SOUND -->
<audio id="matchSound" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>

<script>
const images = [
  "Screenshot 2026-03-20 125829.png",
  "Screenshot 2026-03-20 125836.png",
  "Screenshot 2026-03-20 125847.png",
  "Screenshot 2026-03-20 125859.png",
  "Screenshot 2026-03-20 125904.png",
  "Screenshot 2026-03-20 125914.png",
  "Screenshot 2026-03-20 125922.png",
  "Screenshot 2026-03-20 125927.png"
];

let cards = [];
let flipped = [];
let moves = 0;

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function startGame() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  moves = 0;
  document.getElementById("moves").innerText = "Züge: 0";

  const selected = shuffle(images).slice(0, 8);
  cards = shuffle([...selected, ...selected]);

  cards.forEach((img) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="front"></div>
      <div class="back"><img src="${img}"></div>
    `;

    card.onclick = () => flipCard(card, img);
    grid.appendChild(card);
  });
}

function flipCard(card, img) {
  if (flipped.length >= 2 || card.classList.contains("flip")) return;

  card.classList.add("flip");
  flipped.push({card, img});

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").innerText = "Züge: " + moves;

    if (flipped[0].img === flipped[1].img) {
      flipped[0].card.classList.add("match");
      flipped[1].card.classList.add("match");

      // SOUND
      document.getElementById("ehhh Cem lass mellissa in ruhe").play();

      flipped = [];
    } else {
      setTimeout(() => {
        flipped[0].card.classList.remove("flip");
        flipped[1].card.classList.remove("flip");
        flipped = [];
      }, 800);
    }
  }
}

startGame();
</script>

</body>
</html>
