<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skibidi John Pork Memory</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(45deg, #ff0066, #6a00ff, #008cff, #000000, #00ff88);
      background-size: 400% 400%;
      animation: bgMove 8s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body.shake {
      animation:
        bgMove 8s ease infinite,
        screenShake 0.35s ease;
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-8px, 6px); }
      40% { transform: translate(8px, -6px); }
      60% { transform: translate(-6px, -4px); }
      80% { transform: translate(6px, 4px); }
      100% { transform: translate(0, 0); }
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
      animation: floatOrb 12s ease-in-out infinite;
    }

    .bg-orb.one {
      width: 180px;
      height: 180px;
      background: #ff00aa;
      top: 10%;
      left: 8%;
    }

    .bg-orb.two {
      width: 240px;
      height: 240px;
      background: #00ccff;
      top: 55%;
      right: 8%;
      animation-delay: 2s;
    }

    .bg-orb.three {
      width: 160px;
      height: 160px;
      background: #00ff88;
      bottom: 8%;
      left: 35%;
      animation-delay: 4s;
    }

    @keyframes floatOrb {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.12); }
      100% { transform: translateY(0px) scale(1); }
    }

    .main {
      position: relative;
      z-index: 2;
      padding: 20px 12px 40px;
    }

    h1 {
      font-size: 42px;
      margin: 8px 0 12px;
      text-shadow: 0 0 8px white, 0 0 16px hotpink, 0 0 30px cyan;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .subtitle {
      margin-top: 0;
      color: #fff6ff;
      text-shadow: 0 1px 5px rgba(0,0,0,0.5);
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 14px 0 20px;
    }

    .box {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 22px;
      color: #ffe866;
      box-shadow: 0 0 18px rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      min-width: 150px;
    }

    .buttons {
      margin-bottom: 18px;
    }

    button, .menu-btn {
      margin: 8px;
      padding: 12px 20px;
      font-size: 18px;
      background: linear-gradient(90deg, #ffe600, #ffb300);
      color: black;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover, .menu-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 18px rgba(255, 230, 0, 0.7);
    }

    .progress-wrap {
      max-width: 560px;
      margin: 0 auto 18px;
      text-align: left;
    }

    .progress-label {
      font-weight: bold;
      margin-bottom: 6px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .progress-bar {
      height: 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ff88, #00d9ff, #ffea00);
      border-radius: 999px;
      transition: width 0.35s ease;
      box-shadow: 0 0 14px rgba(0,255,180,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      max-width: 560px;
      margin: auto;
      gap: 14px;
      padding: 0 12px 30px;
    }

    .card {
      width: 100%;
      aspect-ratio: 1;
      background: transparent;
      border-radius: 18px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s, box-shadow 0.3s, filter 0.3s;
      box-shadow: 0 0 14px rgba(0,0,0,0.35);
      animation: cardFloat 3.5s ease-in-out infinite;
    }

    .card:nth-child(2n) { animation-delay: 0.2s; }
    .card:nth-child(3n) { animation-delay: 0.5s; }
    .card:nth-child(4n) { animation-delay: 0.8s; }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .card:hover {
      box-shadow: 0 0 18px rgba(255,255,255,0.35);
      filter: brightness(1.05);
    }

    .card.flip {
      transform: rotateY(180deg) scale(1.03);
    }

    .front, .back {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .front {
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 40%),
        linear-gradient(135deg, #ff00cc, #5f00ff, #0099ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      border: 2px solid rgba(255,255,255,0.16);
    }

    .front::after {
      content: "🐷";
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
    }

    .back {
      transform: rotateY(180deg);
      background: #111;
      border: 2px solid rgba(255,255,255,0.12);
    }

    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .match {
      animation: matchGlow 0.9s ease;
      box-shadow: 0 0 25px #00ff88, 0 0 45px #b7ff00 !important;
    }

    .done {
      cursor: default;
    }

    @keyframes matchGlow {
      0% { transform: rotateY(180deg) scale(1); }
      35% { transform: rotateY(180deg) scale(1.1) rotate(2deg); }
      70% { transform: rotateY(180deg) scale(1.06) rotate(-2deg); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }

    .win-overlay.show {
      display: flex;
    }

    .win-box {
      max-width: 540px;
      width: 100%;
      background: linear-gradient(135deg, rgba(255,0,170,0.25), rgba(0,180,255,0.25), rgba(0,255,140,0.2));
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 28px 22px;
      box-shadow: 0 0 40px rgba(255,255,255,0.12);
      animation: popIn 0.35s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.82); }
      to { opacity: 1; transform: scale(1); }
    }

    .win-box h2 {
      margin-top: 0;
      font-size: 34px;
      text-shadow: 0 0 12px #fff, 0 0 24px #00eaff;
    }

    .win-box p {
      font-size: 20px;
      margin-bottom: 18px;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 25;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      opacity: 0.95;
      animation: particleFly 0.9s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.3);
        opacity: 0;
      }
    }

    @media (max-width: 650px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 430px;
      }

      h1 {
        font-size: 30px;
      }

      .box {
        font-size: 18px;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>
  <div class="bg-orb three"></div>

  <div class="main">
    <h1>💀 Skibidi John Pork Memory 💀</h1>
    <p class="subtitle">Finde alle Paare und mach den krankesten Score 😈</p>

    <div class="hud">
      <div class="box" id="moves">Züge: 0</div>
      <div class="box" id="bestScore">Bester Score: -</div>
      <div class="box" id="timeBox">Zeit: 0s</div>
      <div class="box" id="pairsBox">Paare: 0 / 8</div>
    </div>

    <div class="buttons">
      <button onclick="startGame()">🔄 Neustart</button>
      <a class="menu-btn" href="index.html">🏠 Hauptmenü</a>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">Fortschritt</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <h2>🏆 Du hast gewonnen!</h2>
      <p id="winText">Stark gespielt.</p>
      <button onclick="closeWinOverlay(); startGame();">Nochmal spielen</button>
      <a class="menu-btn" href="index.html">🏠 Hauptmenü</a>
    </div>
  </div>

  <audio id="matchSound" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>

  <script>
    const images = [
      "Screenshot 2026-03-20 125829.png",
      "Screenshot 2026-03-20 125836.png",
      "Screenshot 2026-03-20 125847.png",
      "Screenshot 2026-03-20 125859.png",
      "Screenshot 2026-03-20 125904.png",
      "Screenshot 2026-03-20 125914.png",
      "Screenshot 2026-03-20 125922.png",
      "Screenshot 2026-03-20 125927.png",
      "Screenshot 2026-03-20 125933.png",
      "Screenshot 2026-03-20 125938.png",
      "Screenshot 2026-03-20 125953.png",
      "Screenshot 2026-03-20 125957.png",
      "Screenshot 2026-03-20 130001.png",
      "Screenshot 2026-03-20 130006.png",
      "Screenshot 2026-03-20 130010.png",
      "Screenshot 2026-03-20 130017.png",
      "Screenshot 2026-03-20 130024.png",
      "Screenshot 2026-03-20 130028.png",
      "Screenshot 2026-03-20 155545.png",
      "Screenshot 2026-03-20 173621.png",
      "Screenshot 2026-03-20 173804.png",
      "Screenshot 2026-03-20 180931.png",
      "Screenshot 2026-03-20 180939.png",
      "Screenshot 2026-03-20 180947.png",
      "Screenshot 2026-03-20 180958.png",
      "Screenshot 2026-03-20 181008.png",
      "Screenshot 2026-03-20 181017.png",
      "Screenshot 2026-03-20 181055.png",
      "Screenshot 2026-03-20 181111.png"
    ];

    let cards = [];
    let flipped = [];
    let moves = 0;
    let matchedPairs = 0;
    let timer = 0;
    let timerInterval = null;
    let lockBoard = false;

    const bestKey = "skibidiJohnPorkMemoryBest";
    const grid = document.getElementById("grid");
    const particlesEl = document.getElementById("particles");
    const progressFill = document.getElementById("progressFill");

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function updateBestScoreDisplay() {
      const best = localStorage.getItem(bestKey);
      document.getElementById("bestScore").innerText = best
        ? "Bester Score: " + best
        : "Bester Score: -";
    }

    function saveBestScore() {
      const best = localStorage.getItem(bestKey);
      if (!best || moves < Number(best)) {
        localStorage.setItem(bestKey, moves);
        updateBestScoreDisplay();
        return true;
      }
      return false;
    }

    function updateHud() {
      document.getElementById("moves").innerText = "Züge: " + moves;
      document.getElementById("timeBox").innerText = "Zeit: " + timer + "s";
      document.getElementById("pairsBox").innerText = "Paare: " + matchedPairs + " / 8";
      progressFill.style.width = (matchedPairs / 8) * 100 + "%";
    }

    function startTimer() {
      clearInterval(timerInterval);
      timer = 0;
      timerInterval = setInterval(() => {
        timer++;
        updateHud();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function startGame() {
      closeWinOverlay();
      stopTimer();
      startTimer();

      grid.innerHTML = "";
      moves = 0;
      matchedPairs = 0;
      flipped = [];
      lockBoard = false;

      const selected = shuffle(images).slice(0, 8);
      cards = shuffle([...selected, ...selected]);

      cards.forEach((img) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="front"></div>
          <div class="back"><img src="${img}" alt="Memory Bild"></div>
        `;

        card.onclick = () => flipCard(card, img);
        grid.appendChild(card);
      });

      updateHud();
      updateBestScoreDisplay();
    }

    function flipCard(card, img) {
      if (lockBoard) return;
      if (flipped.length >= 2) return;
      if (card.classList.contains("flip")) return;
      if (card.classList.contains("done")) return;

      card.classList.add("flip");
      flipped.push({ card, img });

      if (flipped.length === 2) {
        moves++;
        updateHud();

        if (flipped[0].img === flipped[1].img) {
          lockBoard = true;

          setTimeout(() => {
            flipped[0].card.classList.add("match", "done");
            flipped[1].card.classList.add("match", "done");

            playMatchSound();
            shakeScreen();
            spawnParticles(flipped[0].card);
            spawnParticles(flipped[1].card);

            matchedPairs++;
            flipped = [];
            lockBoard = false;
            updateHud();

            if (matchedPairs === 8) {
              stopTimer();
              const newBest = saveBestScore();
              showWinOverlay(newBest);
            }
          }, 220);
        } else {
          lockBoard = true;
          setTimeout(() => {
            flipped[0].card.classList.remove("flip");
            flipped[1].card.classList.remove("flip");
            flipped = [];
            lockBoard = false;
          }, 850);
        }
      }
    }

    function playMatchSound() {
      const sound = document.getElementById("matchSound");
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function shakeScreen() {
      document.body.classList.remove("shake");
      void document.body.offsetWidth;
      document.body.classList.add("shake");
      setTimeout(() => document.body.classList.remove("shake"), 350);
    }

    function spawnParticles(card) {
      const rect = card.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let i = 0; i < 16; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = centerX + "px";
        p.style.top = centerY + "px";
        p.style.background = ["#00ff88", "#00d9ff", "#ffea00", "#ff00b7", "#ffffff"][Math.floor(Math.random() * 5)];
        p.style.setProperty("--dx", (Math.random() * 180 - 90) + "px");
        p.style.setProperty("--dy", (Math.random() * 180 - 90) + "px");
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 900);
      }
    }

    function showWinOverlay(newBest) {
      const overlay = document.getElementById("winOverlay");
      const winText = document.getElementById("winText");

      if (newBest) {
        winText.innerHTML = `🔥 Geschafft in <b>${moves}</b> Zügen und <b>${timer}</b> Sekunden!<br>🏆 Neuer bester Score!`;
      } else {
        winText.innerHTML = `🔥 Geschafft in <b>${moves}</b> Zügen und <b>${timer}</b> Sekunden!`;
      }

      overlay.classList.add("show");
    }

    function closeWinOverlay() {
      document.getElementById("winOverlay").classList.remove("show");
    }

    updateBestScoreDisplay();
    startGame();
  </script>
</body>
</html>
