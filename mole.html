<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOHN PORK MOLE GAME</title>
  <style>
    body {
      margin: 0;
      font-family: Comic Sans MS, Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(45deg, black, purple, red, blue);
      background-size: 400% 400%;
      animation: bg 6s infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .topbar {
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 14px 22px;
      box-sizing: border-box;
      border-bottom: 2px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 0;
      z-index: 9999;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .topbar a:hover {
      color: yellow;
    }

    .wrap {
      width: 92%;
      max-width: 900px;
      margin: 28px auto;
      background: rgba(0,0,0,0.65);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 0 30px red;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 0 0 16px white;
    }

    p {
      font-size: 18px;
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
      font-size: 24px;
      font-weight: bold;
    }

    .hud-box {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 20px;
      min-width: 140px;
      box-shadow: 0 0 14px rgba(255,255,255,0.15);
    }

    button {
      padding: 14px 22px;
      background: yellow;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
      transition: 0.2s;
    }

    button:hover {
      background: orange;
      transform: scale(1.05);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 24px;
    }

    .hole {
      position: relative;
      height: 170px;
      background: linear-gradient(180deg, #5a2a00, #2a1200);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: inset 0 -14px 0 rgba(0,0,0,0.3), 0 0 18px rgba(0,0,0,0.4);
      cursor: pointer;
      user-select: none;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 75%;
      height: 34px;
      background: #120700;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: hotpink;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      transition: bottom 0.18s ease;
      box-shadow: 0 0 22px rgba(255,105,180,0.6);
    }

    .hole.up .mole {
      bottom: 32px;
    }

    .mole.hit {
      background: lime;
      transform: translateX(-50%) scale(1.1) rotate(8deg);
    }

    .tiny {
      margin-top: 16px;
      color: #ddd;
      font-size: 15px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 30px;
      }

      .board {
        grid-template-columns: repeat(2, 1fr);
      }

      .hole {
        height: 150px;
      }

      .mole {
        width: 90px;
        height: 90px;
        font-size: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">Home</a>
    <a href="snake.html">Snake</a>
    <a href="mole.html">Mole Game</a>
  </div>

  <div class="wrap">
    <h1>🔨 JOHN PORK MOLE GAME 🐷</h1>
    <p>Klick die Brainrot-Moles so schnell du kannst 💀</p>

    <div class="hud">
      <div class="hud-box">Score: <span id="score">0</span></div>
      <div class="hud-box">Zeit: <span id="time">20</span>s</div>
      <div class="hud-box">Best: <span id="best">0</span></div>
    </div>

    <button onclick="startGame()">▶️ Start</button>

    <div class="board" id="board">
      <div class="hole"><div class="mole">🤌</div></div>
      <div class="hole"><div class="mole">🍝</div></div>
      <div class="hole"><div class="mole">🤌</div></div>
      <div class="hole"><div class="mole">🍕</div></div>
      <div class="hole"><div class="mole">🤌</div></div>
      <div class="hole"><div class="mole">🍝</div></div>
      <div class="hole"><div class="mole">🍕</div></div>
      <div class="hole"><div class="mole">🤌</div></div>
      <div class="hole"><div class="mole">🍝</div></div>
    </div>

    <div class="tiny">
      Ziel: Brainrot anklicken, Punkte sammeln, Bestscore knacken.
    </div>
  </div>

  <script>
    const holes = document.querySelectorAll(".hole");
    const moles = document.querySelectorAll(".mole");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");

    let score = 0;
    let timeLeft = 20;
    let gameRunning = false;
    let moleTimeout = null;
    let timerInterval = null;
    let lastHole = null;

    let best = Number(localStorage.getItem("porkMoleBest") || 0);
    bestEl.textContent = best;

    function randomHole() {
      const index = Math.floor(Math.random() * holes.length);
      const hole = holes[index];
      if (hole === lastHole) return randomHole();
      lastHole = hole;
      return hole;
    }

    function randomEmoji() {
      const emojis = ["🤌", "🍝", "🍕", "🧠", "💀"];
      return emojis[Math.floor(Math.random() * emojis.length)];
    }

    function hideAll() {
      holes.forEach(h => h.classList.remove("up"));
      moles.forEach(m => m.classList.remove("hit"));
    }

    function popMole() {
      if (!gameRunning) return;

      hideAll();
      const hole = randomHole();
      const mole = hole.querySelector(".mole");
      mole.textContent = randomEmoji();
      hole.classList.add("up");

      const speed = Math.max(350, 900 - score * 12);

      moleTimeout = setTimeout(() => {
        hole.classList.remove("up");
        popMole();
      }, speed);
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem("porkMoleBest", best);
        bestEl.textContent = best;
      }
    }

    function whack(hole, mole) {
      if (!gameRunning) return;
      if (!hole.classList.contains("up")) return;

      score++;
      scoreEl.textContent = score;
      mole.classList.add("hit");
      hole.classList.remove("up");
      updateBest();
    }

    holes.forEach(hole => {
      const mole = hole.querySelector(".mole");
      hole.addEventListener("click", () => whack(hole, mole));
    });

    function startGame() {
      clearTimeout(moleTimeout);
      clearInterval(timerInterval);

      score = 0;
      timeLeft = 20;
      gameRunning = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      hideAll();

      popMole();

      timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      gameRunning = false;
      clearTimeout(moleTimeout);
      clearInterval(timerInterval);
      hideAll();
      updateBest();
      setTimeout(() => {
        alert("⏰ Runde vorbei! Dein Score: " + score);
      }, 80);
    }
  </script>
</body>
</html>
