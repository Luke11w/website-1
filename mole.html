<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOHN PORK MOLE GAME</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Comic Sans MS, Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(45deg, black, purple, red, blue);
      background-size: 400% 400%;
      animation: bg 6s infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .topbar {
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 14px 22px;
      box-sizing: border-box;
      border-bottom: 2px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 0;
      z-index: 9999;
      flex-wrap: wrap;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .topbar a:hover {
      color: yellow;
    }

    .wrap {
      width: 94%;
      max-width: 950px;
      margin: 22px auto;
      background: rgba(0,0,0,0.65);
      border-radius: 24px;
      padding: 22px 16px;
      box-shadow: 0 0 30px red;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 0 0 16px white;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .player-select {
      margin: 24px 0 12px 0;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 18px 14px;
      box-shadow: 0 0 18px rgba(255,255,255,0.08);
    }

    .player-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 14px;
      text-shadow: 0 0 10px yellow;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .player-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 14px rgba(255,255,255,0.08);
    }

    .player-card:hover {
      transform: scale(1.03);
      border-color: yellow;
    }

    .player-card.active {
      border-color: yellow;
      box-shadow: 0 0 20px yellow;
      background: rgba(255,255,0,0.12);
    }

    .player-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      margin-bottom: 10px;
    }

    .player-name {
      font-size: 22px;
      font-weight: bold;
    }

    .current-player {
      margin-top: 14px;
      font-size: 20px;
      font-weight: bold;
      color: yellow;
      text-shadow: 0 0 10px orange;
      min-height: 28px;
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
      font-size: 24px;
      font-weight: bold;
    }

    .hud-box {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 18px;
      min-width: 130px;
      box-shadow: 0 0 14px rgba(255,255,255,0.15);
    }

    button {
      padding: 14px 22px;
      background: yellow;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
      transition: 0.2s;
      font-family: inherit;
    }

    button:hover {
      background: orange;
      transform: scale(1.05);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .hole {
      position: relative;
      height: 170px;
      background: linear-gradient(180deg, #5a2a00, #2a1200);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: inset 0 -14px 0 rgba(0,0,0,0.3), 0 0 18px rgba(0,0,0,0.4);
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 75%;
      height: 34px;
      background: #120700;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      border-radius: 16px;
      background: hotpink;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: bottom 0.18s ease, transform 0.15s ease, background 0.15s ease;
      box-shadow: 0 0 22px rgba(255,105,180,0.6);
      overflow: hidden;
      padding: 0;
      pointer-events: none;
    }

    .mole img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hole.up .mole {
      bottom: 32px;
    }

    .mole.hit {
      background: lime;
      transform: translateX(-50%) scale(1.08) rotate(8deg);
    }

    .tiny {
      margin-top: 16px;
      color: #ddd;
      font-size: 15px;
    }

    .warn {
      margin-top: 8px;
      font-size: 17px;
      color: #ffdf7a;
      min-height: 24px;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }

      .wrap {
        width: 96%;
        padding: 16px 10px;
      }

      .player-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .player-card {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
      }

      .player-card img {
        width: 82px;
        height: 82px;
        aspect-ratio: auto;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .player-name {
        font-size: 22px;
      }

      .hud {
        gap: 10px;
        margin: 16px 0;
      }

      .hud-box {
        min-width: 100px;
        padding: 10px 12px;
        font-size: 20px;
      }

      .board {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .hole {
        height: 145px;
        border-radius: 18px;
      }

      .mole {
        width: 86px;
        height: 86px;
      }

      button {
        width: 100%;
        max-width: 320px;
        margin: 6px auto;
        display: block;
      }
    }

    @media (max-width: 420px) {
      .board {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .hole {
        height: 130px;
      }

      .mole {
        width: 76px;
        height: 76px;
      }

      .hud-box {
        min-width: 90px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">Home</a>
    <a href="snake.html">Snake</a>
    <a href="mole.html">Mole Game</a>
  </div>

  <div class="wrap">
    <h1>🔨 JOHN PORK MOLE GAME 🐷</h1>
    <p>Klick die Brainrot-Bilder so schnell du kannst 💀</p>

    <div class="player-select">
      <div class="player-title">Wähle deinen Player</div>

      <div class="player-grid">
        <div class="player-card active" data-name="Cem" data-img="Screenshot 2026-03-20 155545.png">
          <img src="Screenshot 2026-03-20 155545.png" alt="Cem">
          <div class="player-name">Cem</div>
        </div>

        <div class="player-card" data-name="Blablabla" data-img="Image (40).jpg">
          <img src="Image (40).jpg" alt="Blablabla">
          <div class="player-name">Blablabla</div>
        </div>

        <div class="player-card" data-name="Lausbub" data-img="Image (41).jpg">
          <img src="Image (41).jpg" alt="Lausbub">
          <div class="player-name">Lausbub</div>
        </div>
      </div>

      <div class="current-player" id="currentPlayerText">Aktueller Player: Cem</div>
      <div class="warn" id="warnText"></div>
    </div>

    <div class="hud">
      <div class="hud-box">Score: <span id="score">0</span></div>
      <div class="hud-box">Zeit: <span id="time">20</span>s</div>
      <div class="hud-box">Best: <span id="best">0</span></div>
    </div>

    <button id="startBtn">▶️ Start</button>

    <div class="board" id="board">
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
      <div class="hole"><div class="mole"><img src="Screenshot 2026-03-20 155545.png" alt="brainrot"></div></div>
    </div>

    <div class="tiny">
      Ziel: Brainrot anklicken, Punkte sammeln, Bestscore knacken.
    </div>
  </div>

  <script>
    const holes = document.querySelectorAll(".hole");
    const moles = document.querySelectorAll(".mole");
    const moleImages = document.querySelectorAll(".mole img");
    const playerCards = document.querySelectorAll(".player-card");

    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const currentPlayerText = document.getElementById("currentPlayerText");
    const warnText = document.getElementById("warnText");
    const startBtn = document.getElementById("startBtn");

    let score = 0;
    let timeLeft = 20;
    let gameRunning = false;
    let moleTimeout = null;
    let timerInterval = null;
    let lastHole = null;

    let selectedPlayerName = "Cem";
    let selectedPlayerImg = "Screenshot 2026-03-20 155545.png";

    let best = Number(localStorage.getItem("porkMoleBest") || 0);
    bestEl.textContent = best;

    function applySelectedPlayerImage() {
      moleImages.forEach(img => {
        img.src = selectedPlayerImg;
        img.alt = selectedPlayerName;
      });
      currentPlayerText.textContent = "Aktueller Player: " + selectedPlayerName;
    }

    function randomHole() {
      const index = Math.floor(Math.random() * holes.length);
      const hole = holes[index];
      if (hole === lastHole) return randomHole();
      lastHole = hole;
      return hole;
    }

    function hideAll() {
      holes.forEach(h => h.classList.remove("up"));
      moles.forEach(m => m.classList.remove("hit"));
    }

    function popMole() {
      if (!gameRunning) return;

      hideAll();
      const hole = randomHole();
      const mole = hole.querySelector(".mole");
      hole.classList.add("up");

      const speed = Math.max(320, 880 - score * 10);

      moleTimeout = setTimeout(() => {
        hole.classList.remove("up");
        popMole();
      }, speed);
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem("porkMoleBest", best);
        bestEl.textContent = best;
      }
    }

    function whack(hole, mole) {
      if (!gameRunning) return;
      if (!hole.classList.contains("up")) return;

      score++;
      scoreEl.textContent = score;
      mole.classList.add("hit");
      hole.classList.remove("up");
      updateBest();
    }

    holes.forEach(hole => {
      const mole = hole.querySelector(".mole");

      hole.addEventListener("click", () => whack(hole, mole));
      hole.addEventListener("touchstart", (e) => {
        e.preventDefault();
        whack(hole, mole);
      }, { passive: false });
    });

    playerCards.forEach(card => {
      card.addEventListener("click", () => {
        playerCards.forEach(c => c.classList.remove("active"));
        card.classList.add("active");

        selectedPlayerName = card.dataset.name;
        selectedPlayerImg = card.dataset.img;

        applySelectedPlayerImage();
        warnText.textContent = "Player gewählt: " + selectedPlayerName;
      });
    });

    function startGame() {
      clearTimeout(moleTimeout);
      clearInterval(timerInterval);

      applySelectedPlayerImage();

      score = 0;
      timeLeft = 20;
      gameRunning = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      warnText.textContent = "Los geht's mit " + selectedPlayerName + " 🔨";
      hideAll();

      popMole();

      timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      gameRunning = false;
      clearTimeout(moleTimeout);
      clearInterval(timerInterval);
      hideAll();
      updateBest();

      setTimeout(() => {
        alert("⏰ Runde vorbei! Player: " + selectedPlayerName + " | Dein Score: " + score);
      }, 80);
    }

    startBtn.addEventListener("click", startGame);

    applySelectedPlayerImage();
  </script>
</body>
</html>
